syntax = "proto3";

package backend.admin.v1;

import "backend/common/v1/common.proto";

service AdminService {
  rpc MarkResultEntryState(MarkResultEntryStateRequest) returns (MarkResultEntryStateResponse); // for DQ and similar states
  rpc UpdateBookingEntryPoints(UpdateBookingEntryPointsRequest) returns (UpdateBookingEntryPointsResponse);
  rpc CreateManualBookingEntry(CreateManualBookingEntryRequest) returns (CreateManualBookingEntryResponse);
}

message MarkResultEntryStateRequest {
  uint32 result_entry_id = 1;
  backend.common.v1.ResultEntryState state = 2;
}

message MarkResultEntryStateResponse {
  backend.common.v1.ResultEntry result_entry = 1;
}

message UpdateBookingEntryPointsRequest {
  uint32 booking_entry_id = 1;
  int32 points = 2;
  string description = 3;
}

message UpdateBookingEntryPointsResponse {
  backend.common.v1.BookingEntry booking_entry = 1;
}

message CreateManualBookingEntryRequest {
  uint32 event_id = 1;
  backend.common.v1.BookingTargetType target_type = 2;
  uint32 target_id = 3;
  int32 points = 4;
  string description = 5;
}

message CreateManualBookingEntryResponse {
  backend.common.v1.BookingEntry booking_entry = 1;
}
