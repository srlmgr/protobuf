syntax = "proto3";

package backend.query.v1;

import "backend/common/v1/common.proto";

service QueryService {
  rpc GetDriverStandings(GetDriverStandingsRequest) returns (GetDriverStandingsResponse);
  rpc GetTeamStandings(GetTeamStandingsRequest) returns (GetTeamStandingsResponse);
  rpc GetEventResults(GetEventResultsRequest) returns (GetEventResultsResponse);
  rpc GetResultEntry(GetResultEntryRequest) returns (GetResultEntryResponse);
  rpc GetEventBookingEntries(GetEventBookingEntriesRequest) returns (GetEventBookingEntriesResponse);

  rpc GetSimulation(GetSimulationRequest) returns (GetSimulationResponse);
  rpc GetSeries(GetSeriesRequest) returns (GetSeriesResponse);
  rpc GetSeason(GetSeasonRequest) returns (GetSeasonResponse);
  rpc GetEvent(GetEventRequest) returns (GetEventResponse);
  rpc GetRace(GetRaceRequest) returns (GetRaceResponse);
  rpc GetDriver(GetDriverRequest) returns (GetDriverResponse);
  rpc GetTeam(GetTeamRequest) returns (GetTeamResponse);
  rpc GetPointSystem(GetPointSystemRequest) returns (GetPointSystemResponse);
  rpc GetTrack(GetTrackRequest) returns (GetTrackResponse);
  rpc GetTrackLayout(GetTrackLayoutRequest) returns (GetTrackLayoutResponse);
  rpc GetCarManufacturer(GetCarManufacturerRequest) returns (GetCarManufacturerResponse);
  rpc GetCarBrand(GetCarBrandRequest) returns (GetCarBrandResponse);
  rpc GetCarModel(GetCarModelRequest) returns (GetCarModelResponse);

  rpc ListSimulations(ListSimulationsRequest) returns (ListSimulationsResponse);
  rpc ListSeries(ListSeriesRequest) returns (ListSeriesResponse);
  rpc ListSeasons(ListSeasonsRequest) returns (ListSeasonsResponse);
  rpc ListEvents(ListEventsRequest) returns (ListEventsResponse);
  rpc ListRaces(ListRacesRequest) returns (ListRacesResponse);
  rpc ListDrivers(ListDriversRequest) returns (ListDriversResponse);
  rpc ListTeams(ListTeamsRequest) returns (ListTeamsResponse);
  rpc ListPointSystems(ListPointSystemsRequest) returns (ListPointSystemsResponse);
  rpc ListTracks(ListTracksRequest) returns (ListTracksResponse);
  rpc ListTrackLayouts(ListTrackLayoutsRequest) returns (ListTrackLayoutsResponse);
  rpc ListCarManufacturers(ListCarManufacturersRequest) returns (ListCarManufacturersResponse);
  rpc ListCarBrands(ListCarBrandsRequest) returns (ListCarBrandsResponse);
  rpc ListCarModels(ListCarModelsRequest) returns (ListCarModelsResponse);
}

message GetDriverStandingsRequest {
  uint32 season_id = 1;
  uint32 as_of_event_id = 2;
}

message GetDriverStandingsResponse {
  repeated backend.common.v1.DriverStanding standings = 1;
}

message GetTeamStandingsRequest {
  uint32 season_id = 1;
  uint32 as_of_event_id = 2;
}

message GetTeamStandingsResponse {
  repeated backend.common.v1.TeamStanding standings = 1;
}

message GetEventResultsRequest {
  uint32 event_id = 1;
  uint32 race_id = 2;
}

message GetEventResultsResponse {
  repeated backend.common.v1.ResultEntry rows = 1;
}

message GetResultEntryRequest {
  uint32 result_entry_id = 1;
}

message GetResultEntryResponse {
  backend.common.v1.ResultEntry result_entry = 1;
}

message GetEventBookingEntriesRequest {
  uint32 event_id = 1;
}

message GetEventBookingEntriesResponse {
  repeated backend.common.v1.BookingEntry rows = 1;
}

message GetSimulationRequest {
  uint32 id = 1;
}

message GetSimulationResponse {
  backend.common.v1.Simulation simulation = 1;
}

message GetSeriesRequest {
  uint32 id = 1;
}

message GetSeriesResponse {
  backend.common.v1.Series series = 1;
}

message GetSeasonRequest {
  uint32 id = 1;
}

message GetSeasonResponse {
  backend.common.v1.Season season = 1;
}

message GetEventRequest {
  uint32 id = 1;
}

message GetEventResponse {
  backend.common.v1.Event event = 1;
}

message GetRaceRequest {
  uint32 id = 1;
}

message GetRaceResponse {
  backend.common.v1.Race race = 1;
}

message GetDriverRequest {
  uint32 id = 1;
}

message GetDriverResponse {
  backend.common.v1.Driver driver = 1;
}

message GetTeamRequest {
  uint32 id = 1;
}

message GetTeamResponse {
  backend.common.v1.Team team = 1;
}

message GetPointSystemRequest {
  uint32 id = 1;
}

message GetPointSystemResponse {
  backend.common.v1.PointSystem point_system = 1;
}

message GetTrackRequest {
  uint32 id = 1;
}

message GetTrackResponse {
  backend.common.v1.Track track = 1;
}

message GetTrackLayoutRequest {
  uint32 id = 1;
}

message GetTrackLayoutResponse {
  backend.common.v1.TrackLayout track_layout = 1;
}

message GetCarManufacturerRequest {
  uint32 id = 1;
}

message GetCarManufacturerResponse {
  backend.common.v1.CarManufacturer car_manufacturer = 1;
}

message GetCarBrandRequest {
  uint32 id = 1;
}

message GetCarBrandResponse {
  backend.common.v1.CarBrand car_brand = 1;
}

message GetCarModelRequest {
  uint32 id = 1;
}

message GetCarModelResponse {
  backend.common.v1.CarModel car_model = 1;
}

message ListSimulationsRequest {}

message ListSimulationsResponse {
  repeated backend.common.v1.Simulation items = 1;
}

message ListSeriesRequest {
  uint32 simulation_id = 1;
}

message ListSeriesResponse {
  repeated backend.common.v1.Series items = 1;
}

message ListSeasonsRequest {
  uint32 series_id = 1;
}

message ListSeasonsResponse {
  repeated backend.common.v1.Season items = 1;
}

message ListEventsRequest {
  uint32 season_id = 1;
}

message ListEventsResponse {
  repeated backend.common.v1.Event items = 1;
}

message ListRacesRequest {
  uint32 event_id = 1;
}

message ListRacesResponse {
  repeated backend.common.v1.Race items = 1;
}

message ListDriversRequest {}

message ListDriversResponse {
  repeated backend.common.v1.Driver items = 1;
}

message ListTeamsRequest {
  uint32 season_id = 1;
}

message ListTeamsResponse {
  repeated backend.common.v1.Team items = 1;
}

message ListPointSystemsRequest {}

message ListPointSystemsResponse {
  repeated backend.common.v1.PointSystem items = 1;
}

message ListTracksRequest {}

message ListTracksResponse {
  repeated backend.common.v1.Track items = 1;
}

message ListTrackLayoutsRequest {
  uint32 track_id = 1;
}

message ListTrackLayoutsResponse {
  repeated backend.common.v1.TrackLayout items = 1;
}

message ListCarManufacturersRequest {}

message ListCarManufacturersResponse {
  repeated backend.common.v1.CarManufacturer items = 1;
}

message ListCarBrandsRequest {
  uint32 manufacturer_id = 1;
}

message ListCarBrandsResponse {
  repeated backend.common.v1.CarBrand items = 1;
}

message ListCarModelsRequest {
  uint32 manufacturer_id = 1;
}

message ListCarModelsResponse {
  repeated backend.common.v1.CarModel items = 1;
}
